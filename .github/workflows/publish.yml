name: Publish to npm

on:
  push:
    tags:
      - 'sprite-plugin@*'
      - 'shared-inspector@*'
      - 'mf-bridge@*'
      - 'mf-ssr@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - shared-inspector
          - sprite-plugin
          - mf-bridge
          - mf-ssr

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build sprite-plugin
        if: startsWith(github.ref, 'refs/tags/sprite-plugin@') || inputs.package == 'sprite-plugin'
        run: npm run build
        working-directory: packages/sprite-plugin

      - name: Build shared-inspector
        if: startsWith(github.ref, 'refs/tags/shared-inspector@') || inputs.package == 'shared-inspector'
        run: npm run build
        working-directory: packages/shared-inspector

      - name: Build mf-bridge
        if: startsWith(github.ref, 'refs/tags/mf-bridge@') || inputs.package == 'mf-bridge'
        run: npm run build
        working-directory: packages/mf-bridge

      - name: Build mf-bridge (mf-ssr dependency)
        if: startsWith(github.ref, 'refs/tags/mf-ssr@') || inputs.package == 'mf-ssr'
        run: npm run build
        working-directory: packages/mf-bridge

      - name: Build mf-ssr
        if: startsWith(github.ref, 'refs/tags/mf-ssr@') || inputs.package == 'mf-ssr'
        run: npm run build
        working-directory: packages/mf-ssr

      - name: Test sprite-plugin
        if: startsWith(github.ref, 'refs/tags/sprite-plugin@') || inputs.package == 'sprite-plugin'
        run: npx vitest run packages/sprite-plugin

      - name: Test shared-inspector
        if: startsWith(github.ref, 'refs/tags/shared-inspector@') || inputs.package == 'shared-inspector'
        run: npx vitest run packages/shared-inspector

      - name: Test mf-bridge
        if: startsWith(github.ref, 'refs/tags/mf-bridge@') || inputs.package == 'mf-bridge'
        run: npm run test
        working-directory: packages/mf-bridge

      - name: Test mf-ssr
        if: startsWith(github.ref, 'refs/tags/mf-ssr@') || inputs.package == 'mf-ssr'
        run: npm run test
        working-directory: packages/mf-ssr

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish sprite-plugin
        if: startsWith(github.ref, 'refs/tags/sprite-plugin@') || inputs.package == 'sprite-plugin'
        run: npm publish --access public
        working-directory: packages/sprite-plugin

      - name: Publish shared-inspector
        if: startsWith(github.ref, 'refs/tags/shared-inspector@') || inputs.package == 'shared-inspector'
        run: npm publish --access public
        working-directory: packages/shared-inspector

      - name: Publish mf-bridge
        if: startsWith(github.ref, 'refs/tags/mf-bridge@') || inputs.package == 'mf-bridge'
        run: npm publish --access public
        working-directory: packages/mf-bridge

      - name: Publish mf-ssr
        if: startsWith(github.ref, 'refs/tags/mf-ssr@') || inputs.package == 'mf-ssr'
        run: npm publish --access public
        working-directory: packages/mf-ssr
