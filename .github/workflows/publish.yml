name: Publish to npm

on:
  push:
    tags:
      - 'sprite-plugin@*'
      - 'shared-inspector@*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish sprite-plugin
        if: startsWith(github.ref, 'refs/tags/sprite-plugin@')
        run: npm publish --access public
        working-directory: packages/sprite-plugin

      - name: Publish shared-inspector
        if: startsWith(github.ref, 'refs/tags/shared-inspector@')
        run: npm publish --access public
        working-directory: packages/shared-inspector
