<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="520" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="520" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCE7F3"/>
      <stop offset="1" stop-color="#FBCFE8"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="680" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="620" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCFCE7"/>
      <stop offset="1" stop-color="#BBF7D0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <style>
      .title { font: 700 40px Inter, Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px Inter, Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 28px Inter, Arial, sans-serif; fill: #0F172A; }
      .mono { font: 600 22px 'SFMono-Regular', Consolas, monospace; fill: #0F172A; }
      .mono-small { font: 600 20px 'SFMono-Regular', Consolas, monospace; fill: #0F172A; }
      .body { font: 500 22px Inter, Arial, sans-serif; fill: #1E293B; }
      .pill { font: 700 16px Inter, Arial, sans-serif; fill: #4338CA; }
      .note { font: 700 24px Inter, Arial, sans-serif; fill: #166534; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>

  <text x="100" y="90" class="title">The Solution</text>
  <text x="100" y="128" class="subtitle">Build a sprite that includes only the icons actually imported by the source code.</text>

  <!-- Top left -->
  <g filter="url(#shadow)">
    <rect x="120" y="190" rx="28" ry="28" width="470" height="330" fill="url(#box1)" stroke="#7DD3FC" stroke-width="2"/>
  </g>
  <rect x="148" y="215" rx="999" ry="999" width="140" height="34" fill="#FFFFFF" fill-opacity="0.78"/>
  <text x="173" y="238" class="pill">Input A</text>
  <text x="160" y="295" class="card-title">Your Source Code</text>
  <text x="160" y="360" class="mono">import CartIcon</text>
  <text x="160" y="395" class="mono">  from 'icons/cart'</text>
  <text x="160" y="455" class="mono">import SearchIcon</text>
  <text x="160" y="490" class="mono">  from 'icons/search'</text>

  <!-- Top right -->
  <g filter="url(#shadow)">
    <rect x="1210" y="190" rx="28" ry="28" width="470" height="330" fill="url(#box2)" stroke="#F9A8D4" stroke-width="2"/>
  </g>
  <rect x="1238" y="215" rx="999" ry="999" width="140" height="34" fill="#FFFFFF" fill-opacity="0.78"/>
  <text x="1263" y="238" class="pill">Input B</text>
  <text x="1250" y="295" class="card-title">icons/ folder</text>
  <text x="1250" y="360" class="mono-small">cart.svg</text>
  <text x="1250" y="398" class="mono-small">search.svg</text>
  <text x="1250" y="436" class="mono-small">star.svg</text>
  <text x="1250" y="474" class="mono-small">profile.svg</text>
  <text x="1250" y="512" class="mono-small">... 495 more</text>

  <!-- Middle -->
  <g filter="url(#shadow)">
    <rect x="510" y="590" rx="32" ry="32" width="780" height="285" fill="url(#box3)" stroke="#A78BFA" stroke-width="2"/>
  </g>
  <rect x="540" y="616" rx="999" ry="999" width="190" height="36" fill="#FFFFFF" fill-opacity="0.78"/>
  <text x="570" y="640" class="pill">Build step</text>
  <text x="560" y="700" class="card-title">@mf-toolkit/sprite</text>

  <circle cx="575" cy="755" r="8" fill="#6366F1"/>
  <text x="600" y="763" class="body">Scan source for icon imports</text>

  <circle cx="575" cy="805" r="8" fill="#6366F1"/>
  <text x="600" y="813" class="body">Match imports to SVG files</text>

  <circle cx="575" cy="855" r="8" fill="#6366F1"/>
  <text x="600" y="863" class="body">Optimize and generate used-only sprite</text>

  <!-- Bottom -->
  <g filter="url(#shadow)">
    <rect x="620" y="930" rx="28" ry="28" width="560" height="135" fill="url(#box4)" stroke="#86EFAC" stroke-width="2"/>
  </g>
  <rect x="648" y="955" rx="999" ry="999" width="150" height="34" fill="#FFFFFF" fill-opacity="0.8"/>
  <text x="673" y="978" class="pill">Output</text>
  <text x="660" y="1035" class="card-title">Generated sprite.ts</text>

  <!-- Arrows: two top blocks into middle block -->
  <path d="M 355 520 L 355 555 L 900 555 L 900 590" stroke="#6366F1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1445 520 L 1445 555 L 900 555 L 900 590" stroke="#6366F1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow middle to bottom -->
  <path d="M 900 875 L 900 930" stroke="#6366F1" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <rect x="1220" y="968" rx="18" ry="18" width="280" height="56" fill="#FFFFFF" fill-opacity="0.8"/>
  <text x="1252" y="1003" class="note">Only used icons included</text>

  <!-- Decorative -->
  <g opacity="0.14">
    <circle cx="1580" cy="105" r="44" fill="#60A5FA"/>
    <circle cx="1660" cy="145" r="28" fill="#A78BFA"/>
    <circle cx="95" cy="1020" r="54" fill="#34D399"/>
  </g>
</svg>
